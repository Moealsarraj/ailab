<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }
  body { font-family: Inter, sans-serif; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .glass-effect { background: rgba(250,251,252,0.8); backdrop-filter: blur(12px); }
  .ghost-border { outline: 1px solid rgba(171,179,183,0.15); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c0c8d0; border-radius: 10px; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #c0c8d0; border-radius: 10px; }
  .code-editor { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace; }
  .editor-bg   { background: #1e1e2e; color: #cdd6f4; }
  .arabic-text { font-family: 'Segoe UI',Tahoma,Arial,sans-serif; }
  .toolbar-blur  { background: rgba(250,251,252,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .btn-primary   { display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#2d3548;color:#ffffff;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer; }
  .btn-secondary { display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(0,0,0,0.06);color:#3C3C43;border-radius:7px;font-size:12px;font-weight:500;border:none;cursor:pointer; }
  .section-label { font-size:11px;font-weight:500;color:#636366;text-transform:uppercase;letter-spacing:.06em; }
  .sys-label, .text-sys-label { color: #1C1C1E; }
  @media (max-width: 768px) {
    aside.fixed, aside.w-64, aside.w-72, .shrink-0.w-64 { display: none !important; }
    main.ml-64, main.ml-72, .ml-64, .ml-72 { margin-left: 0 !important; }
    header.fixed, nav.fixed { padding-left: 12px !important; padding-right: 12px !important; }
    .grid-cols-12 > .col-span-8, .grid-cols-12 > .col-span-4 { grid-column: span 12 !important; }
    .grid-cols-2 { grid-template-columns: 1fr !important; }
    .max-w-3xl, .max-w-4xl, .max-w-5xl, .max-w-7xl { max-width: 100% !important; padding-left: 16px !important; padding-right: 16px !important; }
    section.p-8, div.p-8 { padding: 16px !important; }
    .text-4xl, .text-5xl { font-size: 1.75rem !important; line-height: 1.2 !important; }
    .flex.items-center.gap-3, .flex.items-center.gap-4 { flex-wrap: wrap; }
    .flex-1.overflow-hidden { flex: 1 1 auto; min-width: 0; }
  }
  .hub-back-btn {
    display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0;
    padding: 4px 10px 4px 7px; border-radius: 100px;
    background: rgba(45,53,72, .08);
    border: 1px solid rgba(45,53,72, .18);
    color: #2d3548; font-size: 11px; font-weight: 500;
    text-decoration: none; transition: background .15s;
    font-family: Inter, sans-serif; white-space: nowrap; vertical-align: middle;
  }
  .hub-back-btn:hover { background: rgba(45,53,72, .14); }
  .hub-back-btn-icon { font-size: 14px !important; color: #2d3548; line-height: 1; vertical-align: middle; }
</style>
{% block extra_head %}{% endblock %}
<meta name="csrf-token" content="{{ csrf_token() }}"/>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
{% block content %}{% endblock %}
{% block extra_scripts %}{% endblock %}

<script>
(function() {
  var toolAlphas = {"prompt-bench":"0.10","prompt-shield":"0.14","agent-builder":"0.09","arabic-bench":"0.12"};
  var path = window.location.pathname.replace(/\/+$/, "").split("/").filter(Boolean)[0] || "";
  if (path !== "") {
    var btn = document.createElement("a");
    btn.href = "/";
    btn.className = "hub-back-btn";
    var icon = document.createElement("span");
    icon.className = "material-symbols-outlined hub-back-btn-icon";
    icon.textContent = "arrow_back_ios_new";
    var lbl = document.createElement("span");
    lbl.textContent = "AI Lab";
    btn.appendChild(icon);
    btn.appendChild(lbl);
    var navEl = document.querySelector("header, nav");
    if (navEl) {
      var leftDiv = navEl.querySelector("div");
      if (leftDiv) { leftDiv.insertBefore(btn, leftDiv.firstChild); }
      else { navEl.insertBefore(btn, navEl.firstChild); }
    } else {
      document.body.insertBefore(btn, document.body.firstChild);
    }
  }
})();
</script>
</body>
</html>
